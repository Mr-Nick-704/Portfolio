<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Laboratory placeholder image">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1417"/>
      <stop offset="1" stop-color="#0e1d22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2d7c79" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2d7c79" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <rect x="90" y="90" width="1020" height="580" rx="28" fill="#0c171b" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="90" y="90" width="1020" height="580" rx="28" fill="url(#glow)"/>
  <g fill="#ffffff" fill-opacity="0.9">
    <text x="140" y="190" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="42" font-weight="700" letter-spacing="0.5">
      Science, simplified
    </text>
    <text x="140" y="240" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" fill-opacity="0.75">
      Replace this placeholder with a real lab or clinical image whenever you have assets.
    </text>
  </g>
  <g transform="translate(140 320)" stroke="#ffffff" stroke-opacity="0.18" fill="none" stroke-width="2">
    <path d="M0 280 L920 280"/>
    <path d="M0 0 L920 0"/>
    <path d="M0 0 L0 280"/>
    <path d="M920 0 L920 280"/>
  </g>
  <g transform="translate(200 380)" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.25">
    <path d="M50 0 h120 v70 a40 40 0 0 1 -40 40 h-40 a40 40 0 0 1 -40 -40 z" />
    <path d="M290 10 h140 v60 a40 40 0 0 1 -40 40 h-60 a40 40 0 0 1 -40 -40 z" />
    <path d="M560 0 h130 v70 a40 40 0 0 1 -40 40 h-50 a40 40 0 0 1 -40 -40 z" />
  </g>
</svg>

